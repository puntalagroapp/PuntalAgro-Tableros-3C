<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingreso · Puntal Agro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F0F2F5;--card:#fff;--border:#E4E8EE;--text:#0F1923;--muted:#7A8899;--olive:#4A6533;--ochre:#A86A1F;--terra:#C8642D;--radius:12px;--mono:ui-monospace,SFMono-Regular,Menlo,monospace;--sans:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:15px;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:380px;overflow:hidden;box-shadow:0 8px 30px rgba(15,25,35,.08)}
.top{background:var(--olive);padding:22px 24px;border-bottom:4px solid var(--terra);display:flex;align-items:center;gap:12px}
.top .top-logo{width:42px;height:42px;flex-shrink:0;background:#fff;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:5px}
.top .top-logo img{max-width:100%;max-height:100%;width:auto;height:auto;display:block}
.top .logo-sub{font-size:11px;font-family:var(--sans);font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.9)}
.top h1{font-size:18px;font-weight:700;letter-spacing:-.3px;margin-top:3px;color:#fff;line-height:1.2}
.body{padding:22px 24px 24px}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;margin-top:14px}
label:first-child{margin-top:0}
input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:var(--sans);font-size:14px;color:var(--text)}
input:focus{outline:none;border-color:var(--olive)}
.btn{width:100%;margin-top:20px;background:var(--olive);color:#fff;border:none;border-radius:8px;padding:11px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;transition:background .12s}
.btn:hover{background:#3c5429}
.err{margin-top:14px;font-size:12.5px;color:var(--terra);min-height:16px}
.hint{margin-top:18px;font-size:11px;color:var(--muted);line-height:1.5;border-top:1px solid var(--border);padding-top:14px}
.hint code{font-family:var(--mono);background:var(--bg);padding:1px 5px;border-radius:4px}
</style>
</head>
<body>

<div class="card">
  <div class="top">
    <div class="top-logo"><img src="logo-iso.png" alt="Puntal Agro"></div>
    <div>
      <div class="logo-sub">Puntal Agro</div>
      <h1>Herramientas de Gestión y Tableros de Decisión</h1>
    </div>
  </div>
  <div class="body">
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="usuario@empresa.com" autocomplete="username" onkeydown="if(event.key==='Enter')entrar()">
    <label for="pass">Contraseña</label>
    <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')entrar()">
    <button class="btn" onclick="entrar()">Ingresar</button>
    <div class="err" id="err"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
// Redirigir si ya hay sesión
(function () {
  try {
    var s = JSON.parse(localStorage.getItem('pa_sesion_activa') || 'null');
    if (s && s.token) location.href = 'index.html';
  } catch (e) {}
})();

var _PA_AK = 'PA_e5f208d00ad24d859032f68d253f06ac8ca3408eb6ebf4310eb5d3a94b5dbed0';

function entrar() {
  var email = document.getElementById('email').value.trim();
  var pass  = document.getElementById('pass').value;
  var errEl = document.getElementById('err');
  errEl.textContent = '';
  if (!email) { errEl.textContent = 'Ingresá tu email.'; return; }

  var xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/auth/login', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('Authorization', 'Bearer ' + _PA_AK);
  xhr.onreadystatechange = function () {
    if (xhr.readyState !== 4) return;
    var json = null;
    try { json = JSON.parse(xhr.responseText); } catch (e) {}
    if (xhr.status >= 200 && xhr.status < 300) {
      localStorage.setItem('pa_sesion_activa', JSON.stringify(json.sesion));
      location.href = 'index.html';
    } else {
      errEl.textContent = (json && json.error) ? json.error : 'Error al iniciar sesión';
    }
  };
  xhr.send(JSON.stringify({ email: email, password: pass }));
}
</script>

</body>
</html>
